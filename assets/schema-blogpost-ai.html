            "@type": "Answer",
            "text": "No. Claude is not a citation database and cannot guarantee references generated from memory are real. Use Claude to build search strategies, interpret abstracts, and synthesize findings. Let PubMed handle retrieval. The PubMed MCP connector bridges this gap by giving Claude live database access."

          }

          "name": "What is the best prompt format for medical literature search?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Frame your clinical question using PICO format (Population, Intervention, Comparison, Outcome), then ask Claude to generate a PubMed Boolean search string with MeSH terms. This produces precise queries you can paste directly into PubMed. Adding a study design filter (PICOS) narrows results by evidence level."
          }
