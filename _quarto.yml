project:
  type: website
  render:
    - "*.qmd"
    - "!cv.qmd"
    - "!resume-old.qmd"
  resources:
    - robots.txt
    - llms.txt


website:
  site-url: "https://lszabo.me"
  # google-analytics: "G-B84ES4BRHJ"
  title: "Laszlo Szabo"
  description: "Academic portfolio of Laszlo Szabo, Consultant Transplant Surgeon at Cardiff Transplant Unit. Research in kidney and pancreas transplantation, organ utilisation, and data science."
  favicon: images/favicon.svg

  open-graph: true
  twitter-card:
    site: "@drszabolaszlo"
  
  navbar:
    left:
      - text: CV
        href: resume.qmd
      - text: Research
        href: publications.qmd
      - text: Posts
        href: posts.qmd
    
    right:
      - text: "{{< fa brands github >}}"
        href: https://github.com/Laszlo75
        aria-label: GitHub
      - text: "{{< fa brands orcid >}}"
        href: https://orcid.org/0000-0002-6881-1542
        aria-label: ORCID
      - text: "{{< fa brands researchgate >}}"
        href: https://www.researchgate.net/profile/Laszlo-Szabo-8
        aria-label: ResearchGate
      - text: "{{< fa brands linkedin >}}"
        href: https://www.linkedin.com/in/drszabolaszlo/
        aria-label: LinkedIn
      - text: "{{< fa brands x-twitter >}}"
        href: https://x.com/drszabolaszlo
        aria-label: X
      - text: "{{< fa solid envelope >}}"
        href: "mailto:laszlo.szabo@wales.nhs.uk"
        aria-label: Email

  page-footer:
    left: "&copy; 2026 Laszlo Szabo · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)"

    center: <span class="faux-block">{{< fa brands orcid >}} [{{< var orcid >}}](https://orcid.org/{{< var orcid >}})</span>

    right:
      - icon: github
        text: "Source"
        href: https://github.com/Laszlo75/portfolio-website
       
      
   # background: "#2780e3"

